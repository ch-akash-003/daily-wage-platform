<!doctype html>
<html>
  <head>
    <title>Login - Daily Wage Platform</title>
  </head>
  <body>
    <h2>Daily Wage Workers Platform</h2>

    <h3>Register</h3>

    <form action="/register" method="POST">
      <label>Name:</label><br />
      <input type="text" name="name" required /><br /><br />

      <label>Role:</label><br />
      <select name="role">
        <option value="worker">Worker</option>
        <option value="client">Client</option></select
      ><br /><br />

      <button type="submit">Register</button>
    </form>
  </body>
</html>
